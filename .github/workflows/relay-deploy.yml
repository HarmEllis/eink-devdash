name: Relay Deploy

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: deploy worker
    runs-on: ubuntu-24.04
    env:
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
    defaults:
      run:
        working-directory: relay

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: relay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Relay tests
        run: npm test

      # Deploying targets a maintainer's own Cloudflare account. When no
      # CF_API_TOKEN secret is configured (the default for the self-hosted
      # model, where each user deploys their own relay), skip the deploy
      # instead of failing — build and tests above still gate the release.
      - name: Check Cloudflare credentials
        id: gate
        run: |
          if [ -z "$CF_API_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "CF_API_TOKEN not set — skipping relay deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Worker
        if: steps.gate.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: relay
