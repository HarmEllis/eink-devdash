<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eink-devdash flasher</title>
  <script
    type="module"
    src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"
  ></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <header>
      <h1>eink-devdash</h1>
      <p id="status">Disconnected</p>
    </header>

    <section>
      <h2>1. Connect Device</h2>
      <div class="row">
        <esp-web-install-button manifest="manifest.json"></esp-web-install-button>
        <button id="connect-button" type="button">Connect Serial</button>
      </div>
    </section>

    <section>
      <h2>2. Load Current Config</h2>
      <div class="row">
        <button id="load-button" type="button" disabled>Load Config</button>
        <button id="reprovision-button" type="button" disabled>Reprovision WiFi</button>
      </div>
    </section>

    <section>
      <h2>3. Network Editor</h2>
      <div id="network-list" class="stack"></div>
      <button id="add-network-button" type="button" disabled>Add Network</button>
    </section>

    <section>
      <h2>4. Save / Apply</h2>
      <div class="row">
        <button id="save-button" type="button" disabled>Save Selected Network</button>
        <button id="reorder-networks-button" type="button" disabled>Apply Network Order</button>
      </div>
      <p class="note">The device restarts after each saved change.</p>
    </section>
  </main>

  <script type="module" src="config-ui.js"></script>
</body>
</html>
