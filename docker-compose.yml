services:
  api:
    image: ghcr.io/harmellis/eink-devdash:${IMAGE_TAG:-latest}
    build: ./api
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "3000:3000"
    volumes:
      - ${HOME}/.claude:/home/node/.claude:rw
      - ${HOME}/.codex:/home/node/.codex-source:ro
    environment:
      - HOME=/home/node
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_NOTIFICATIONS_TOKEN=${GITHUB_NOTIFICATIONS_TOKEN:-}
      - CODE_HOST_PROVIDER=${CODE_HOST_PROVIDER:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      - GITLAB_BASE_URL=${GITLAB_BASE_URL:-}
      - CODEX_PLAN_TYPE=${CODEX_PLAN_TYPE:-}
      - CODEX_LIVE_USAGE=${CODEX_LIVE_USAGE:-true}
      - CODEX_CLI_PATH=${CODEX_CLI_PATH:-}
      - CODEX_APP_SERVER_TIMEOUT_MS=${CODEX_APP_SERVER_TIMEOUT_MS:-}
      - CODEX_OVERAGE_USD=${CODEX_OVERAGE_USD:-}
      - CLAUDE_OVERAGE_USD=${CLAUDE_OVERAGE_USD:-}
      - CODEX_HOME=/tmp/devdash-codex-runtime
      - CODEX_SOURCE_HOME=/home/node/.codex-source
      - CODEX_SESSIONS_DIR=/home/node/.codex-source/sessions
      - DEVICE_TOKEN=${DEVICE_TOKEN}
      - DEVICE_UUID=${DEVICE_UUID:-}
      - DASHBOARD_LOCALE=${DASHBOARD_LOCALE:-}
      - DASHBOARD_TIME_ZONE=${DASHBOARD_TIME_ZONE:-}
      - MDNS_ENABLED=${MDNS_ENABLED:-true}
      - MDNS_NAME=${MDNS_NAME:-devdash-api}
      - OTA_ENABLED=${OTA_ENABLED:-true}
      # Enable relay publishing on exactly one API service per DEVICE_UUID.
      - RELAY_ENABLED=${RELAY_ENABLED:-false}
      - RELAY_URL=${RELAY_URL:-}
      - RELAY_PUBLISH_KEY=${RELAY_PUBLISH_KEY:-}
      - RELAY_RECONNECT_MIN_MS=${RELAY_RECONNECT_MIN_MS:-}
      - RELAY_RECONNECT_MAX_MS=${RELAY_RECONNECT_MAX_MS:-}
      - RELAY_HEARTBEAT_INTERVAL_MS=${RELAY_HEARTBEAT_INTERVAL_MS:-}
      - RELAY_HEARTBEAT_TIMEOUT_MS=${RELAY_HEARTBEAT_TIMEOUT_MS:-}
    restart: unless-stopped

  api-mdns-host:
    profiles:
      - mdns-host
    image: ghcr.io/harmellis/eink-devdash:${IMAGE_TAG:-latest}
    build: ./api
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    network_mode: host
    volumes:
      - ${HOME}/.claude:/home/node/.claude:rw
      - ${HOME}/.codex:/home/node/.codex-source:ro
    environment:
      - HOME=/home/node
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_NOTIFICATIONS_TOKEN=${GITHUB_NOTIFICATIONS_TOKEN:-}
      - CODE_HOST_PROVIDER=${CODE_HOST_PROVIDER:-}
      - GITLAB_TOKEN=${GITLAB_TOKEN:-}
      - GITLAB_BASE_URL=${GITLAB_BASE_URL:-}
      - CODEX_PLAN_TYPE=${CODEX_PLAN_TYPE:-}
      - CODEX_LIVE_USAGE=${CODEX_LIVE_USAGE:-true}
      - CODEX_CLI_PATH=${CODEX_CLI_PATH:-}
      - CODEX_APP_SERVER_TIMEOUT_MS=${CODEX_APP_SERVER_TIMEOUT_MS:-}
      - CODEX_OVERAGE_USD=${CODEX_OVERAGE_USD:-}
      - CLAUDE_OVERAGE_USD=${CLAUDE_OVERAGE_USD:-}
      - CODEX_HOME=/tmp/devdash-codex-runtime
      - CODEX_SOURCE_HOME=/home/node/.codex-source
      - CODEX_SESSIONS_DIR=/home/node/.codex-source/sessions
      - DEVICE_TOKEN=${DEVICE_TOKEN}
      - DEVICE_UUID=${DEVICE_UUID:-}
      - DASHBOARD_LOCALE=${DASHBOARD_LOCALE:-}
      - DASHBOARD_TIME_ZONE=${DASHBOARD_TIME_ZONE:-}
      - MDNS_ENABLED=${MDNS_ENABLED:-true}
      - MDNS_NAME=${MDNS_NAME:-devdash-api}
      - OTA_ENABLED=${OTA_ENABLED:-true}
      # Enable relay publishing on exactly one API service per DEVICE_UUID.
      - RELAY_ENABLED=${RELAY_ENABLED:-false}
      - RELAY_URL=${RELAY_URL:-}
      - RELAY_PUBLISH_KEY=${RELAY_PUBLISH_KEY:-}
      - RELAY_RECONNECT_MIN_MS=${RELAY_RECONNECT_MIN_MS:-}
      - RELAY_RECONNECT_MAX_MS=${RELAY_RECONNECT_MAX_MS:-}
      - RELAY_HEARTBEAT_INTERVAL_MS=${RELAY_HEARTBEAT_INTERVAL_MS:-}
      - RELAY_HEARTBEAT_TIMEOUT_MS=${RELAY_HEARTBEAT_TIMEOUT_MS:-}
    restart: unless-stopped
