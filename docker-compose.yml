services:
  api:
    build: ./api
    ports:
      - "3000:3000"
    volumes:
      - ${HOME}/.claude:/home/node/.claude:ro
      - ${HOME}/.codex:/home/node/.codex:ro
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - CODEX_PLAN_TYPE=${CODEX_PLAN_TYPE}
      - DEVICE_TOKEN=${DEVICE_TOKEN}
      - MDNS_ENABLED=${MDNS_ENABLED:-true}
      - MDNS_NAME=${MDNS_NAME:-devdash-api}
    restart: unless-stopped

  api-mdns-host:
    profiles:
      - mdns-host
    build: ./api
    network_mode: host
    volumes:
      - ${HOME}/.claude:/home/node/.claude:ro
      - ${HOME}/.codex:/home/node/.codex:ro
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - CODEX_PLAN_TYPE=${CODEX_PLAN_TYPE}
      - DEVICE_TOKEN=${DEVICE_TOKEN}
      - MDNS_ENABLED=${MDNS_ENABLED:-true}
      - MDNS_NAME=${MDNS_NAME:-devdash-api}
    restart: unless-stopped
