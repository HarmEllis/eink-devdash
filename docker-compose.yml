services:
  api:
    image: ghcr.io/harmellis/eink-devdash:${IMAGE_TAG:-latest}
    build: ./api
    ports:
      - "3000:3000"
    volumes:
      - ${HOME}/.claude:/home/node/.claude:ro
      - ${HOME}/.codex:/home/node/.codex
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - CODEX_PLAN_TYPE=${CODEX_PLAN_TYPE:-}
      - CODEX_LIVE_USAGE=${CODEX_LIVE_USAGE:-true}
      - CODEX_CLI_PATH=${CODEX_CLI_PATH:-}
      - CODEX_APP_SERVER_TIMEOUT_MS=${CODEX_APP_SERVER_TIMEOUT_MS:-}
      - DEVICE_TOKEN=${DEVICE_TOKEN}
      - MDNS_ENABLED=${MDNS_ENABLED:-true}
      - MDNS_NAME=${MDNS_NAME:-devdash-api}
    restart: unless-stopped

  api-mdns-host:
    profiles:
      - mdns-host
    image: ghcr.io/harmellis/eink-devdash:${IMAGE_TAG:-latest}
    build: ./api
    network_mode: host
    volumes:
      - ${HOME}/.claude:/home/node/.claude:ro
      - ${HOME}/.codex:/home/node/.codex
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - CODEX_PLAN_TYPE=${CODEX_PLAN_TYPE:-}
      - CODEX_LIVE_USAGE=${CODEX_LIVE_USAGE:-true}
      - CODEX_CLI_PATH=${CODEX_CLI_PATH:-}
      - CODEX_APP_SERVER_TIMEOUT_MS=${CODEX_APP_SERVER_TIMEOUT_MS:-}
      - DEVICE_TOKEN=${DEVICE_TOKEN}
      - MDNS_ENABLED=${MDNS_ENABLED:-true}
      - MDNS_NAME=${MDNS_NAME:-devdash-api}
    restart: unless-stopped
